services:
  - type: web
    name: journey-to-engineer
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Add your Supabase environment variables in Render dashboard:
      # NEXT_PUBLIC_SUPABASE_URL
      # NEXT_PUBLIC_SUPABASE_ANON_KEY  
      # SUPABASE_SERVICE_ROLE_KEY